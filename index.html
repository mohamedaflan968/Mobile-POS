<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Billing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>
<body class="dark-mode">
    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-container">
                <img src="logo.svg" alt="POS Logo" class="splash-logo">
            </div>
            <h1 class="splash-title">Mobile POS</h1>
            <p class="splash-subtitle">Billing System</p>
            <div class="loader">
                <div class="loader-bar"></div>
            </div>
            <p class="loading-text">Developed By <br> Mohamed Aflan</p>
        </div>
    </div>

    <div id="login-section" class="login-container" style="display: none;">
        <div class="login-card">
            <div class="login-header">
                <img src="logo.svg" alt="POS Logo" class="login-logo">
                <h2>Mobile POS</h2>
                <p>Billing System</p>
            </div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user"></i> Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                    <div class="invalid-feedback">Please enter username</div>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback">Please enter password</div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me">
                    <label class="form-check-label" for="remember-me">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <div class="login-hint mt-3">
                    <small><i class="fas fa-info-circle"></i> Default:Username & Password</small>
                </div>
            </form>
            <button id="skip-login" class="btn btn-link w-100 mt-2">
                <i class="fas fa-arrow-right"></i> Skip to Dashboard
            </button>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
